# Database credentials are stored in AWS Secrets Manager:
# - project-bedrock/mysql-credentials
# - project-bedrock/postgres-credentials
# 
# The values below are injected at deployment time.
# In production, use External Secrets Operator to sync from Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: retail-app
type: Opaque
stringData:
  username: admin
  host: project-bedrock-mysql.cofeq2eis5an.us-east-1.rds.amazonaws.com
  port: "3306"
  database: sampledb
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: retail-app
type: Opaque
stringData:
  username: postgres
  host: project-bedrock-postgres.cofeq2eis5an.us-east-1.rds.amazonaws.com
  port: "5432"
  database: retailstore
